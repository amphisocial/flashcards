<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your Library | Athena Flashcards</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=20260724-student" />
</head>
<body data-page="library">
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="/" aria-label="Athena Flashcards home">
        <span class="brand-mark">A</span>
        <span><strong>Athena</strong> Flashcards</span>
      </a>
      <nav class="nav-links">
        <a href="/app">Create</a>
        <a href="/library" class="active">Your Library</a>
        <a href="/board" id="whiteboardNavLink" style="display:none">Whiteboard</a>
        <a href="/team" id="teamNavLink" style="display:none">Team</a>
        <a href="/#pricing">Pricing</a>
      </nav>
      <div class="auth-area" id="authArea"></div>
    </header>

    <main class="app-page">
      <section class="panel library-panel">
        <div class="panel-header">
          <div>
            <span class="section-kicker">Library</span>
            <h2>Your Library</h2>
          </div>
          <button class="btn soft" id="refreshLibrary">Refresh</button>
        </div>
        <div class="library-columns">
          <div>
            <h3>Created by you</h3>
            <div class="set-list" id="mySets"></div>
          </div>
          <div>
            <h3>Shared with you</h3>
            <div class="set-list" id="sharedSets"></div>
          </div>
        </div>

        <div id="sharedBoardsWrap" style="display:none; margin-top:26px;">
          <h3>Whiteboards shared with you</h3>
          <div class="set-list" id="sharedBoards"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="/common.js?v=20260724-student"></script>
  <script src="/library.js?v=20260724-student"></script>
</body>
</html>
